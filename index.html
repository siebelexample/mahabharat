<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahabharat Puzzle Board Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Mahabharat: The Epic Journey</h1>
            <p>Move your character across the board to discover the epic tales of Mahabharat</p>
        </header>
        
        <div class="game-content">
            <div class="game-board" id="gameBoard">
                <!-- Board tiles will be generated by JavaScript -->
            </div>
            
            <div class="game-info">
                <div class="story-panel" id="storyPanel">
                    <h3>Welcome to the Epic Journey!</h3>
                    <p>Click on a tile to move your character and discover the stories of Mahabharat. Use the arrow keys or click on adjacent tiles to move.</p>
                </div>
                
                <div class="controls">
                    <button id="resetGame">Reset Game</button>
                    <div class="position-info">
                        <span>Position: <span id="currentPosition">1, 1</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
